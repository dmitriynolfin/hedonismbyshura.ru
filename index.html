<!-- Скрипт для активации кнопок -->
<script>
// Ждем загрузки страницы
document.addEventListener('DOMContentLoaded', function() {
    
    // 1. Обработчик для кнопки "ЗАКАЗАТЬ БОКС" в слайдере
    const orderButtons = document.querySelectorAll('.t675__btn, .btn-order');
    orderButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            // Прокрутка к каталогу или открытие корзины
            const catalogSection = document.querySelector('[data-record-type="905"]');
            if (catalogSection) {
                catalogSection.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });
    
    // 2. Обработчик для иконки корзины
    const cartIcons = document.querySelectorAll('.t-menuwidgeticons__cart a, .t706__carticon, [href="#opencart"]');
    cartIcons.forEach(icon => {
        icon.addEventListener('click', function(e) {
            e.preventDefault();
            // Открываем корзину Tilda
            if (typeof tcart__open === 'function') {
                tcart__open();
            } else {
                // Если функция недоступна, ищем и показываем корзину
                const cartPage = document.querySelector('.t706__cartpage');
                if (cartPage) {
                    cartPage.style.display = 'block';
                }
            }
        });
    });
    
    // 3. Обработчик для кнопки МАГАЗИН
    const shopButtons = document.querySelectorAll('.btn-shop, [href="/store"]');
    shopButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            // Прокрутка к каталогу
            const catalogSection = document.querySelector('.t905');
            if (catalogSection) {
                catalogSection.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });
    
    // 4. Плавная прокрутка для якорных ссылок
    const anchorLinks = document.querySelectorAll('a[href^="#"]');
    anchorLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            const href = this.getAttribute('href');
            if (href !== '#' && href !== '#opencart' && href !== '#openmembersbar') {
                e.preventDefault();
                const target = document.querySelector(href);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
    });
    
    // 5. Обработчик для переключателя языка
    const langButton = document.querySelector('.js-lang-button');
    if (langButton) {
        langButton.addEventListener('click', function() {
            const langDropdown = document.querySelector('.t-menu-base__langs_dropdown');
            if (langDropdown) {
                langDropdown.style.display = langDropdown.style.display === 'block' ? 'none' : 'block';
            }
        });
    }
    
    // 6. Закрытие выпадающего меню языка при клике вне его
    document.addEventListener('click', function(e) {
        const langButton = document.querySelector('.js-lang-button');
        const langDropdown = document.querySelector('.t-menu-base__langs_dropdown');
        if (langDropdown && !langButton.contains(e.target) && !langDropdown.contains(e.target)) {
            langDropdown.style.display = 'none';
        }
    });
    
    // 7. Инициализация корзины Tilda (если скрипты загрузились)
    if (typeof tcart__init === 'function') {
        setTimeout(function() {
            const cartElement = document.querySelector('[data-cart-countdown]');
            if (cartElement) {
                tcart__init(cartElement.closest('.t706'));
            }
        }, 500);
    }
    
    // 8. Мобильное меню (бургер)
    const burgerButton = document.querySelector('.t-menu-burger');
    if (burgerButton) {
        burgerButton.addEventListener('click', function() {
            const menu = document.querySelector('.t-menu-base');
            if (menu) {
                menu.classList.toggle('t-menu-base__burgermenu__visible');
                document.body.classList.toggle('t1272__body_menushowed');
            }
        });
    }
    
    // 9. Кнопка закрытия мобильного меню
    const closeMenuButtons = document.querySelectorAll('.t-menu-base__burgermenu__close-button');
    closeMenuButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            const menu = document.querySelector('.t-menu-base');
            if (menu) {
                menu.classList.remove('t-menu-base__burgermenu__visible');
                document.body.classList.remove('t1272__body_menushowed');
            }
        });
    });
    
    console.log('Все кнопки активированы!');
});
</script>
