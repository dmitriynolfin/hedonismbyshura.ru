<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вестник Гедонизма - Доставка еды</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo">
                    <div class="lemon-circle"></div>
                </div>
                <nav class="nav-menu">
                    <a href="#guide" class="nav-link">ГИД ПО БОКСАМ</a>
                    <a href="#contacts" class="nav-link">КОНТАКТЫ</a>
                </nav>
            </div>
            
            <div class="header-right">
                <div class="contact-info">
                    <a href="tel:+79636221265" class="phone">+7 963 622 12 65</a>
                    <span class="location">PRIME PARK, МОСКВА</span>
                </div>
                
                <div class="header-icons">
                    <button class="icon-btn" aria-label="Профиль">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </button>
                    
                    <button class="icon-btn cart-btn" aria-label="Корзина">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <path d="M16 10a4 4 0 0 1-8 0"></path>
                        </svg>
                        <span class="cart-count">0</span>
                    </button>
                </div>
                
                <a href="#shop" class="btn-shop">МАГАЗИН</a>
                
                <div class="lang-selector">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span>RU</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-slider">
            <div class="hero-slide active">
                <div class="hero-image" style="background-image: url('images/hero-bg.jpg');"></div>
            </div>
        </div>
        
        <div class="hero-content">
            <button class="btn-order">ЗАКАЗАТЬ БОКС</button>
        </div>
        
        <div class="slider-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
